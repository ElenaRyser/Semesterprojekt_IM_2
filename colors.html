<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hueniverse</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/classic.min.css">
    <link rel="icon" type="image/svg" href="img/Logo_Hueniverse.svg">
</head>
<body>
    <div class="stars-background"></div>

    <header class="main-header">
        <div class="logo">
            <a href="index.html">
                <img src="img/Logo_Hueniverse.svg" alt="Hueniverse Logo">
            </a>
        </div>
        <div class="search-container">
        <div class="search-group">
            <div class="search-bar">
                <input type="text" id="hex-input" placeholder="#">
                <button class="search-btn" onclick="searchHex()">
                    <img src="img/Lupe_Icon.svg" alt="Lupe Icon">
                </button>
            </div>
            <p class="hex-error" id="hex-error"></p>
        </div>

        <div class="search-group">
            <div class="search-bar usage-bar">
                <div class="color-picker">
                    <div id="pickr-btn"></div>
                    <span id="color-label">Klicken, um Farbe zu wählen</span>
                    </div>
                    <button class="search-btn" onclick="searchColor()">
                    <img src="img/Lupe_Icon.svg" alt="Lupe Icon">
                </button>
            </div>
        </div>
    </div> 
    </header>

    <main class="container">
        <section class="glass-panel hero">
            <div class="hero-content">
                <h1 id="colorName">Farbe</h1>
                <h3 id="colorKeywords">Drei Schlagworte</h3>
                <p id="colorDescription">Farbbeschreibung</p>
            </div>
            <div class="color-preview"></div>
        </section>


        <section class="codes-grid">
            <div class="glass-panel code-card">
                <div class="card-header">
                    <div class="header-icon-circle">
                        <img src="img/HEX_Icon.svg" alt="HEX-Icon">
                    </div>
                    <label>HEX</label>
                </div>
                
                <div class="input-field">
                    <span id="HEX-Value">#</span>
                    <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('HEX-Value', this)">
                        <img src="img/Copy_Icon.svg" alt="Kopieren">
                    </button>
                </div>
            </div>

            <div class="glass-panel code-card">
                <div class="card-header">
                    <div class="header-icon-circle">
                        <img src="img/RGB_Icon.svg" alt="RGB-Icon">
                    </div>
                    <label>RGB</label>
                </div>
                
                <div class="input-field">
                    <span id="RGB-Value">R G B</span>
                    <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('RGB-Value', this)">
                        <img src="img/Copy_Icon.svg" alt="Kopieren">
                    </button>
                </div>
            </div>

            <div class="glass-panel code-card">
                <div class="card-header">
                    <div class="header-icon-circle">
                        <img src="img/CMYK_Icon.svg" alt="CMYK-Icon">
                    </div>
                    <label>CMYK</label>
                </div>
                
                <div class="input-field">
                    <span id="CMYK-Value">C M Y K</span>
                    <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('CMYK-Value', this)">
                        <img src="img/Copy_Icon.svg" alt="Kopieren">
                    </button>
                </div>
            </div>

            <div class="glass-panel code-card">
                <div class="card-header">
                    <div class="header-icon-circle">
                        <img src="img/HSL_Icon.svg" alt="HSL-Icon">
                    </div>
                    <label>HSL</label>
                </div>
                
                <div class="input-field">
                    <span id="HSL-Value">H S L</span>
                    <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('HSL-Value', this)">
                        <img src="img/Copy_Icon.svg" alt="Kopieren">
                    </button>
                </div>
            </div>

            <div class="glass-panel code-card">
                <div class="card-header">
                    <div class="header-icon-circle">
                        <img src="img/HSV_Icon.svg" alt="HSV-Icon">
                    </div>
                    <label>HSV</label>
                </div>
                
                <div class="input-field">
                    <span id="HSV-Value">H S V</span>
                    <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('HSV-Value', this)">
                        <img src="img/Copy_Icon.svg" alt="Kopieren">
                    </button>
                </div>
            </div>
            
            <div class="glass-panel code-card">
                <div class="card-header">
                    <div class="header-icon-circle">
                        <img src="img/XYZ_Icon.svg" alt="XYZ-Icon">
                    </div>
                    <label>XYZ</label>
                </div>
                
                <div class="input-field">
                    <span id="XYZ-Value">X Y Z</span>
                    <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('XYZ-Value', this)">
                        <img src="img/Copy_Icon.svg" alt="Kopieren">
                    </button>
                </div>
            </div>
            
        </section>



        <section class="glass-panel variants">
            <h4>Farbvarianten</h4>
            <div class="variants-grid">
                
                <div class="variant-item">
                    <div class="swatch current" id="colorPreviewCurrent">
                        <span class="pill-label">Aktuell</span>
                    </div>
                    <div class="input-field variant-code-field">
                        <span id="colorHexCurrent" >#</span>
                        <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('colorHexCurrent', this)">
                            <img src="img/Copy_Icon.svg" alt="Kopieren">
                        </button>
                    </div>
                </div>

                <div class="variant-item">
                    <div class="swatch darker" id="colorPreviewDarker">
                        <span class="pill-label">Dunkler</span>
                    </div>
                    <div class="input-field variant-code-field">
                        <span id="colorHexDarker">#</span>
                        <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('colorHexDarker', this)">
                            <img src="img/Copy_Icon.svg" alt="Kopieren">
                        </button>
                    </div>
                </div>

                <div class="variant-item">
                    <div class="swatch lighter" id="colorPreviewBrighter">
                        <span class="pill-label">Heller</span>
                    </div>
                    <div class="input-field variant-code-field">
                        <span id="colorHexBrighter">#</span>
                        <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('colorHexBrighter', this)">
                            <img src="img/Copy_Icon.svg" alt="Kopieren">
                        </button>
                    </div>
                </div>

                <div class="variant-item">
                    <div class="swatch desaturated" id="colorPreviewDesaturated">
                        <span class="pill-label">Entsättigt</span>
                    </div>
                    <div class="input-field variant-code-field">
                        <span id="colorHexDesaturated">#</span>
                        <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('colorHexDesaturated', this)">
                            <img src="img/Copy_Icon.svg" alt="Kopieren">
                        </button>
                    </div>
                </div>

                <div class="variant-item">
                    <div class="swatch saturated" id="colorPreviewSaturated">
                        <span class="pill-label">Satter</span>
                    </div>
                    <div class="input-field variant-code-field">
                        <span id="colorHexSaturated">#</span>
                        <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('colorHexSaturated', this)">
                            <img src="img/Copy_Icon.svg" alt="Kopieren">
                        </button>
                    </div>
                </div>

                <div class="variant-item">
                    <div class="swatch contrast" id="colorPreviewContrast">
                        <span class="pill-label">Kontrast</span>
                    </div>
                    <div class="input-field variant-code-field">
                        <span id="colorHexContrast">#</span>
                        <button class="copy-btn" title="Kopieren" onclick="copyToClipboard('colorHexContrast', this)">
                            <img src="img/Copy_Icon.svg" alt="Kopieren">
                        </button>
                    </div>
                </div>

            </div>
        </section>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
