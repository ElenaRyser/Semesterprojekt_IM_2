<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hueniverse</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/classic.min.css">
</head>
<body class="page-home">
    <div class="stars-background"></div>

    <header class="main-header">
        <div class="logo-home">
            <img src="img/Logo_Hueniverse.svg" alt="Hueniverse Logo">
        </div>
    <div class="search-container">

        <div class="search-group">
        <p class="search-label">Gib einen HEX-Code ein</p>
        <div class="search-bar">
            <input type="text" id="hex-input" placeholder="#">
            <button class="search-btn" onclick="searchHex()">
                <img src="img/Lupe_Icon.svg" alt="Lupe Icon">
            </button>
        </div>
    </div>

    <div class="search-group">
        <p class="search-label">Oder wähle deine Farbe</p>
        <div class="search-bar usage-bar">
            <div class="color-picker">
                <div id="pickr-btn" ></div>
                <span id="color-label">Klicken, um Farbe zu wählen</span>
            </div>
            <button class="search-btn" onclick="searchColor()">
                <img src="img/Lupe_Icon.svg" alt="Lupe Icon">
            </button>
             </div>
         </div>
    </div> 
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <script src="js/script.js"></script>   
</body>
</html>
